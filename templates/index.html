<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dentist Patient Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-4xl font-bold text-blue-600 mb-8">Dentist Patient Management</h1>
        <div class="mb-6">
            <a href="{{ url_for('add_patient') }}" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded">Add New Patient</a>
        </div>
        
        <div class="mb-8">
            <input type="text" id="search-input" placeholder="Search patients..." class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        
        <h2 class="text-2xl font-semibold text-gray-800 mb-4">Patient List</h2>
        <div id="patient-list" class="grid gap-4 md:grid-cols-2 lg:grid-cols-3">
            {% for patient in patients %}
            <div class="bg-white shadow-md rounded-lg p-6">
                <h3 class="text-xl font-semibold text-gray-800 mb-2">{{ patient.nom }} {{ patient.prenom }}</h3>
                <p class="text-gray-600 mb-1">Téléphone: {{ patient.telephone }}</p>
                <p class="text-gray-600 mb-1">Carte Nationale: {{ patient.numero_carte_national }}</p>
                <a href="{{ url_for('patient_detail', patient_id=patient.id) }}" class="text-blue-500 hover:text-blue-600">View Details</a>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('search-input');
        const patientList = document.getElementById('patient-list');

        searchInput.addEventListener('input', debounce(liveSearch, 300));

        function debounce(func, delay) {
            let timeoutId;
            return function (...args) {
                clearTimeout(timeoutId);
                timeoutId = setTimeout(() => func.apply(this, args), delay);
            };
        }

        function liveSearch() {
            const query = searchInput.value;
            axios.get(`/live_search?query=${query}`)
                .then(response => {
                    const patients = response.data;
                    updatePatientList(patients);
                })
                .catch(error => console.error('Error:', error));
        }

        function updatePatientList(patients) {
            patientList.innerHTML = patients.map(patient => `
                <div class="bg-white shadow-md rounded-lg p-6">
                    <h3 class="text-xl font-semibold text-gray-800 mb-2">${patient.nom} ${patient.prenom}</h3>
                    <p class="text-gray-600 mb-1">Téléphone: ${patient.telephone}</p>
                    <p class="text-gray-600 mb-1">Carte Nationale: ${patient.numero_carte_national}</p>
                    <a href="/patient/${patient.id}" class="text-blue-500 hover:text-blue-600">View Details</a>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
