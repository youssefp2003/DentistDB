<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Visit</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
    <nav class="bg-white shadow-md">
        <div class="container mx-auto px-6 py-3">
            <div class="flex justify-between items-center">
                <div class="text-2xl font-semibold text-primary">
                    Dentist Patient Management
                </div>
                <div>
                    <a href="{{ url_for('index') }}" class="text-gray-800 hover:text-primary mx-3 transition-all">Home</a>
                    <a href="{{ url_for('add_patient') }}" class="text-gray-800 hover:text-primary mx-3 transition-all">Add Patient</a>
                    <a href="{{ url_for('unpaid_balances') }}" class="text-gray-800 hover:text-primary mx-3 transition-all">Unpaid Balances</a>
                </div>
            </div>
        </div>
    </nav>
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-4xl font-bold text-blue-600 mb-8">Add New Visit for {{ patient.nom }} {{ patient.prenom }}</h1>
        <form action="{{ url_for('add_visit', patient_id=patient.id) }}" method="post" class="bg-white shadow-md rounded-lg p-6 max-w-md mx-auto">
            <div class="mb-4">
                <label for="date" class="block text-gray-700 font-bold mb-2">Date:</label>
                <input type="date" id="date" name="date" required class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div class="mb-4">
                <label for="acte" class="block text-gray-700 font-bold mb-2">Acte:</label>
                <input type="text" id="acte" name="acte" required class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div class="mb-4">
                <label for="prix" class="block text-gray-700 font-bold mb-2">Prix:</label>
                <input type="number" step="0.01" id="prix" name="prix" required class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div class="mb-6">
                <label for="paye" class="block text-gray-700 font-bold mb-2">Payé:</label>
                <input type="number" step="0.01" id="paye" name="paye" required class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div class="flex items-center justify-between">
                <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">Add Visit</button>
                <a href="{{ url_for('patient_detail', patient_id=patient.id) }}" class="text-blue-500 hover:text-blue-600">Back to Patient Details</a>
            </div>
        </form>
    </div>
</body>
</html>
