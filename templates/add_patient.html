<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Patient</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-4xl font-bold text-blue-600 mb-8">Add New Patient</h1>
        <form action="{{ url_for('add_patient') }}" method="post" class="bg-white shadow-md rounded-lg p-6 max-w-md mx-auto">
            <div class="mb-4">
                <label for="nom" class="block text-gray-700 font-bold mb-2">Nom:</label>
                <input type="text" id="nom" name="nom" required class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div class="mb-4">
                <label for="prenom" class="block text-gray-700 font-bold mb-2">Prénom:</label>
                <input type="text" id="prenom" name="prenom" required class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div class="mb-4">
                <label for="telephone" class="block text-gray-700 font-bold mb-2">Téléphone:</label>
                <input type="tel" id="telephone" name="telephone" required class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div class="mb-4">
                <label for="numero_carte_national" class="block text-gray-700 font-bold mb-2">Numéro Carte Nationale:</label>
                <input type="text" id="numero_carte_national" name="numero_carte_national" required class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div class="mb-4">
                <label for="assurance" class="block text-gray-700 font-bold mb-2">Assurance:</label>
                <input type="text" id="assurance" name="assurance" class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div class="mb-4">
                <label for="profession" class="block text-gray-700 font-bold mb-2">Profession:</label>
                <input type="text" id="profession" name="profession" class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div class="mb-4">
                <label for="maladie" class="block text-gray-700 font-bold mb-2">Maladie:</label>
                <input type="text" id="maladie" name="maladie" class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div class="mb-6">
                <label for="observation" class="block text-gray-700 font-bold mb-2">Observation:</label>
                <textarea id="observation" name="observation" class="w-full p-2 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500" rows="4"></textarea>
            </div>
            
            <div class="flex items-center justify-between">
                <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">Add Patient</button>
                <a href="{{ url_for('index') }}" class="text-blue-500 hover:text-blue-600">Back to Patient List</a>
            </div>
        </form>
    </div>
</body>
</html>
